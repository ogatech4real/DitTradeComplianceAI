version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      MPLBACKEND: Agg

  streamlit:
    build: .
    command: >-
      streamlit run frontend/app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
      MPLBACKEND: Agg
    depends_on:
      - api
