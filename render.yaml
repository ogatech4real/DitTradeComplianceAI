# Render Blueprint: deploy API + Streamlit as two Python web services.
# Docs: https://render.com/docs/blueprint-spec
#
# After deploy: open the Streamlit service URL for the UI. The UI calls the API via
# API_BASE_URL (wired from the API service public URL).

version: "1"

services:
  - type: web
    name: dittrade-compliance-api
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/
    envVars:
      - key: MPLBACKEND
        value: Agg

  - type: web
    name: dittrade-compliance-streamlit
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: streamlit run frontend/app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: MPLBACKEND
        value: Agg
      - key: API_BASE_URL
        fromService:
          name: dittrade-compliance-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
